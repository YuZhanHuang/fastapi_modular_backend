version: "3.9"

x-test-common: &test-common
  build:
    context: .
    dockerfile: docker/app/Dockerfile
    target: dev
  working_dir: /app
  entrypoint: ["/app/scripts/run-tests.sh"]
  volumes:
    - ./src:/app/src
    - ./tests:/app/tests
    - ./pyproject.toml:/app/pyproject.toml:ro
    - ./uv.lock:/app/uv.lock:ro

services:
  test:
    <<: *test-common

  test-integration:
    <<: *test-common
    profiles: ["integration"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: app
      DB_PASSWORD: app
      DB_NAME: app
      DATABASE_URL: postgresql+psycopg://app:app@db:5432/app
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      RUN_MIGRATIONS: "1"
      WAIT_FOR_MIGRATIONS: "0"
